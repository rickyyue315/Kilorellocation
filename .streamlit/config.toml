[server]
fileWatcherType = "none"
headless = true
enableCORS = true
enableXsrfProtection = true
maxUploadSize = 50

[browser]
gatherUsageStats = false

[theme]
base = "dark"
primaryColor = "#F59E0B"
backgroundColor = "#0B0F19"
secondaryBackgroundColor = "#111827"
textColor = "#F8FAFC"
font = "sans serif"
